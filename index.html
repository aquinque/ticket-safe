  <!-- Preconnect to critical third-parties so the TLS handshake happens
       in parallel with the document parse, shaving ~200ms off the first
       authenticated request. dns-prefetch falls back on browsers that
       cap preconnect. -->
  <link rel="preconnect" href="https://lgmnatfvdzzjzyxlenry.supabase.co" crossorigin>
  <link rel="dns-prefetch" href="https://lgmnatfvdzzjzyxlenry.supabase.co">
  <link rel="preconnect" href="https://js.stripe.com" crossorigin>
  <link rel="dns-prefetch" href="https://js.stripe.com">
  <!-- Brand typography:
       Fraunces (display, editorial serif) → headlines & marketing surfaces.
       Inter (sans, neutral grotesque)      → UI copy & body text.
       JetBrains Mono (monospace)           → prices, order ids, ticket numbers
                                             — mirrors the order-summary.pdf. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap">
  <!-- Modern browsers prefer the SVG (crisp at any DPI) -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- PNG fallbacks: Google search-result favicons require a square PNG/ICO >= 48x48 -->
  <link rel="icon" type="image/png" sizes="16x16"  href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32x32.png">

  <!-- Old Safari pinned-tab -->
  <link rel="mask-icon" href="/favicon.svg" color="#3a5fe6">

  <link rel="manifest" href="/site.webmanifest">
  <script>
    // Restore the path redirected from 404.html (GitHub Pages SPA routing fix)

      if (p) {
        window.history.replaceState(null, '', '/' + decodeURIComponent(p));
      }
    })();
