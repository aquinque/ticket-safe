name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Public Supabase values (anon key — safe to expose in browser bundles)
          # Override by setting VITE_SUPABASE_URL / VITE_SUPABASE_PUBLISHABLE_KEY
          # as GitHub repository secrets (Settings → Secrets and variables → Actions).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://lgmnatfvdzzjzyxlenry.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnbW5hdGZ2ZHp6anp5eGxlbnJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjE2ODUsImV4cCI6MjA4ODE5NzY4NX0.u3ZbqKzuO2vXkck3BvyEgE0Cn9SVez89AYB2XPHE3LY' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Deploy Supabase Edge Functions on every push to main.
  # Runs independently of the frontend build. Skips cleanly (does not fail the
  # pipeline) until SUPABASE_ACCESS_TOKEN is set as a repository secret:
  #   Settings → Secrets and variables → Actions → New repository secret
  #     SUPABASE_ACCESS_TOKEN  — from https://supabase.com/dashboard/account/tokens
  #     SUPABASE_PROJECT_REF   — (optional) overrides the default project ref below
  # Per-function settings (e.g. verify_jwt=false for stripe-webhook) come from
  # supabase/config.toml, which `functions deploy` honours.
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'lgmnatfvdzzjzyxlenry' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping Edge Function deploy."
            exit 0
          fi
          supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
