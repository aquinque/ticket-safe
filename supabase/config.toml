# Disable gateway JWT verification for functions that handle auth internally.
# These functions use service-role client + getUser(token) for authentication,
# so the gateway check is redundant and causes "Invalid JWT" errors.
[functions.submit-listing]
verify_jwt = false

[functions.verify-qr]
verify_jwt = false

[functions.stripe-create-checkout]
verify_jwt = false

# Send Email Hook — called by Supabase Auth itself with Standard Webhooks
# signature. JWT verification must be disabled because the hook is unauthenticated.
[functions.send-auth-email]
verify_jwt = false

# Studio primary-sale checkout — authenticated buyer creates a Stripe
# Checkout Session with destination charges to the organizer's Connect account.
# Internally uses service-role client + getUser(token), so gateway JWT
# verification is redundant.
[functions.studio-create-checkout]
verify_jwt = false

# Organizer notification emails. Authenticated; auth-handled inside the
# function (owner for new_application, admin for approve/reject).
[functions.organizer-notify]
verify_jwt = false