# Disable gateway JWT verification for functions that handle auth internally.
# These functions use service-role client + getUser(token) for authentication,
# so the gateway check is redundant and causes "Invalid JWT" errors.
[functions.submit-listing]
verify_jwt = false

[functions.verify-qr]
verify_jwt = false

[functions.stripe-create-checkout]
verify_jwt = false

# AI assistant chatbot — public; auth is optional.
[functions.ai-assistant]
verify_jwt = false

# AI event draft — admin-only; auth verified internally.
[functions.ai-event-draft]
verify_jwt = false

# AI ticket score — admin-only; auth verified internally.
[functions.ai-ticket-score]
verify_jwt = false